<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Ram Dudh Dairy logo">
  <defs>
    <linearGradient id="rdFresh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4CAF50"/>
      <stop offset="0.55" stop-color="#2E7D32"/>
      <stop offset="1" stop-color="#1B5E20"/>
    </linearGradient>
    <radialGradient id="rdGlow" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF4E4"/>
    </radialGradient>
  </defs>

  <!-- outer badge ring -->
  <circle cx="100" cy="100" r="94" fill="url(#rdFresh)"/>
  <circle cx="100" cy="100" r="80" fill="url(#rdGlow)"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#1B5E20" stroke-width="1.5" opacity="0.3"/>

  <!-- milk drop -->
  <path d="M100 108 C100 130 116 138 116 150 a16 16 0 0 1 -32 0 C84 138 100 130 100 108 Z" fill="#2E7D32" opacity="0.92"/>
  <path d="M100 108 C100 130 116 138 116 150 a16 16 0 0 1 -32 0 C84 138 100 130 100 108 Z" fill="none" stroke="#1B5E20" stroke-width="1.5" opacity="0.4"/>
  <!-- drop highlight -->
  <path d="M94 138 a5 8 0 0 1 4 -9" fill="none" stroke="#EAF4E4" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- two fresh leaves flanking the drop -->
  <path d="M84 118 C74 116 68 108 68 100 C78 101 84 108 84 118 Z" fill="#4CAF50" opacity="0.85"/>
  <path d="M116 118 C126 116 132 108 132 100 C122 101 116 108 116 118 Z" fill="#4CAF50" opacity="0.85"/>

  <!-- devanagari mark -->
  <text x="100" y="88" text-anchor="middle" font-family="'Tiro Devanagari Marathi','Mukta',serif" font-size="52" font-weight="700" fill="#1B5E20">राम</text>
</svg>
