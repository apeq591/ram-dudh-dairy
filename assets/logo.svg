<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Ram Dudh Dairy — cow emblem">
  <defs>
    <linearGradient id="rdButter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBD26B"/>
      <stop offset="1" stop-color="#E8A317"/>
    </linearGradient>
    <linearGradient id="rdGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E8A5A"/>
      <stop offset="1" stop-color="#0E5637"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <circle cx="100" cy="100" r="96" fill="url(#rdButter)"/>
  <circle cx="100" cy="100" r="84" fill="#FFF7E6"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#0E5637" stroke-width="2" opacity="0.9"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#0E5637" stroke-width="1" opacity="0.25"/>

  <!-- horns -->
  <path d="M74 66 C64 58 60 48 64 40 C72 44 78 54 80 66 Z" fill="#FFF7E6" stroke="#0E5637" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M126 66 C136 58 140 48 136 40 C128 44 122 54 120 66 Z" fill="#FFF7E6" stroke="#0E5637" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- ears -->
  <ellipse cx="58" cy="99" rx="17" ry="10.5" fill="url(#rdGreen)" transform="rotate(-24 58 99)"/>
  <ellipse cx="142" cy="99" rx="17" ry="10.5" fill="url(#rdGreen)" transform="rotate(24 142 99)"/>

  <!-- head -->
  <ellipse cx="100" cy="102" rx="43" ry="41" fill="url(#rdGreen)"/>
  <ellipse cx="100" cy="83" rx="33" ry="27" fill="url(#rdGreen)"/>

  <!-- forelock tuft -->
  <path d="M100 60 C94 68 92 74 100 78 C108 74 106 68 100 60 Z" fill="#FBD26B"/>

  <!-- muzzle -->
  <ellipse cx="100" cy="124" rx="27" ry="20.5" fill="#FFF3DC"/>
  <ellipse cx="100" cy="124" rx="27" ry="20.5" fill="none" stroke="#0E5637" stroke-width="1.6" opacity="0.35"/>
  <!-- nostrils -->
  <ellipse cx="90" cy="125" rx="3.6" ry="2.6" fill="#0E5637"/>
  <ellipse cx="110" cy="125" rx="3.6" ry="2.6" fill="#0E5637"/>

  <!-- eyes -->
  <circle cx="83" cy="99" r="6.4" fill="#21302A"/>
  <circle cx="117" cy="99" r="6.4" fill="#21302A"/>
  <circle cx="85" cy="96.6" r="2" fill="#FFF7E6"/>
  <circle cx="119" cy="96.6" r="2" fill="#FFF7E6"/>

  <!-- milk drop charm below chin -->
  <path d="M100 146 C100 155 106 158 106 163 a6 6 0 0 1 -12 0 C94 158 100 155 100 146 Z" fill="#FFF7E6" stroke="#0E5637" stroke-width="2"/>
</svg>
